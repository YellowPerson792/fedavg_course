dataset: cifar10
model: squeezenet_cifar
rounds: 5
num_clients: 2
batch_size: 32
local_epochs: 5
seed: 42
device: cuda
lr: 0.0056
momentum: 0.9
weight_decay: 0.0
optimizer: sgd
partition:
  type: iid
  quantity_ratios: [0.5, 0.5]
data:
  synthetic: false
  train_limit: 2000
  test_limit: 500
server:
  host: 0.0.0.0
  bind_host: 0.0.0.0
  port: 9000
  min_clients: 2
  timeout_seconds: 3600
run:
  dir: runs
  name: pi-eff-squeezenet
  save_every_round: true
